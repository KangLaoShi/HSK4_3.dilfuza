                    { speaker: "独白", hanzi: "虽然第一印象不总是对的，但如果想改变却很困难。", pinyin: "Suīrán dì yī yìnxiàng bù zǒng shì duì de, dàn rúguǒ xiǎng gǎibiàn què hěn kùnnan.", uz: "Garchi birinchi taassurot har doim ham to'g'ri bo'lmasa-da, uni o'zgartirish juda qiyin.", ru: "Хотя первое впечатление не всегда верное, изменить его очень трудно.", en: "Although the first impression is not always right, it is very difficult to change." },

        // --- UTILS ---
        const playAudio = (text) => {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                window.speechSynthesis.speak(utterance);
            }
        };

        const shuffleArray = (array) => {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        };

        // --- UI LOGIC ---
        let activeTab = 'vocab';

        const TABS = [
            { id: 'vocab', label: "Lug'at", icon: "fa-book-open" },
            { id: 'vocabTest', label: "Lug'at testi", icon: "fa-graduation-cap" },
            { id: 'dialogue', label: "Muloqot", icon: "fa-comments" },

        function init() {
            renderTabs();

        function switchTab(tabId) {
            activeTab = tabId;

            const container = document.getElementById('tabs-container');
            container.innerHTML = TABS.map(tab => `
                <button onclick="switchTab('${tab.id}')" class="flex items-center gap-2 px-5 py-3 rounded-full font-medium transition-all duration-300 ${activeTab === tab.id ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-900/50' : 'bg-white/5 text-slate-400 hover:bg-white/10 hover:text-white border border-white/5'}">

            switch (activeTab) {
                case 'vocab':
                    renderVocabCards();

                    startVocabTest();
                    break;

                    renderDialogue();
                    break;

        // --- VOCAB TEST ---
        let vtState = { questions: [], currentIndex: 0, score: 0, finished: false };

        function startVocabTest() {
            const shuffledVocab = shuffleArray(VOCABULARY);
            vtState.questions = shuffledVocab.map(word => {
                let wrongOptions = VOCABULARY.filter(w => w.id !== word.id);
                wrongOptions = shuffleArray(wrongOptions).slice(0, 3).map(w => w.uz);
                return {
                    hanzi: word.hanzi,
                    ans: word.uz,
                    options: shuffleArray([word.uz, ...wrongOptions])
                };
            });
            vtState.currentIndex = 0;
            vtState.score = 0;
            vtState.finished = false;
            renderVocabTestUI();
        }

        function renderVocabTestUI() {
            const container = document.getElementById('main-content');
            if (activeTab !== 'vocabTest') return;

            if (vtState.finished) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-12 bg-white/5 backdrop-blur-sm rounded-2xl border border-white/10">
                        <i class="fa-solid fa-circle-check text-teal-400 text-7xl mb-4"></i>
                        <h2 class="text-3xl font-bold text-white mb-2">Test Yakunlandi!</h2>
                        <p class="text-xl text-slate-300 mb-8">Sizning natijangiz: ${vtState.score} / ${vtState.questions.length}</p>
                        <button onclick="startVocabTest()" class="px-6 py-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-medium transition flex items-center gap-2">
                            <i class="fa-solid fa-rotate-right"></i> Qayta boshlash
                        </button>
                    </div>
                `;
                return;
            }

            const currentQ = vtState.questions[vtState.currentIndex];
            let optionsHtml = currentQ.options.map(opt => `
                <button onclick="handleVocabAnswer(this, '${opt.replace(/'/g, "\\'")}', '${currentQ.ans.replace(/'/g, "\\'")}')" class="vocab-opt-btn p-4 rounded-xl border transition-all duration-300 text-lg font-medium bg-white/10 hover:bg-white/20 border-white/20 text-white">
                    ${opt}
                </button>
            `).join('');

            container.innerHTML = `
                <div class="max-w-2xl mx-auto bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-8 shadow-2xl">
                    <div class="flex justify-between text-slate-400 text-sm font-medium mb-8">
                        <span>Savol: ${vtState.currentIndex + 1} / ${vtState.questions.length}</span>
                        <span>Natija: ${vtState.score}</span>
                    </div>
                    
                    <div class="text-center mb-10">
                        <p class="text-indigo-300 mb-4 text-lg font-medium">Quyidagi so'zning tarjimasini toping:</p>
                        <h1 class="text-7xl font-bold text-white">${currentQ.hanzi}</h1>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        ${optionsHtml}
                    </div>
                </div>
            `;
        }

        window.handleVocabAnswer = function(btn, selectedOpt, correctOpt) {
            const btns = document.querySelectorAll('.vocab-opt-btn');
            btns.forEach(b => {
                b.disabled = true;
                b.classList.remove('bg-white/10', 'hover:bg-white/20', 'border-white/20', 'text-white');
                b.classList.add('bg-white/5', 'border-white/5', 'text-slate-500', 'opacity-50');
                if (b.innerText.trim() === correctOpt) {
                    b.className = "vocab-opt-btn p-4 rounded-xl border transition-all duration-300 text-lg font-medium bg-teal-500/50 border-teal-500 text-white";
                }
            });

            if (selectedOpt === correctOpt) {
                vtState.score++;
            } else {
                btn.className = "vocab-opt-btn p-4 rounded-xl border transition-all duration-300 text-lg font-medium bg-rose-500/50 border-rose-500 text-white";
            }

            setTimeout(() => {
                if (vtState.currentIndex < vtState.questions.length - 1) {
                    vtState.currentIndex++;
                    renderVocabTestUI();
                } else {
                    vtState.finished = true;
                    renderVocabTestUI();
                }
            }, 1000);
        };

                    <div class="bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl overflow-hidden shadow-xl">
                        <div class="bg-indigo-900/40 p-4 border-b border-white/10">
                            <h3 class="text-xl font-bold text-indigo-200">${dialogue.title}</h3>
                        </div>
                        <div class="p-4 md:p-6 space-y-6">
                `;
                dialogue.lines.forEach(line => {
                    html += `
                        <div class="group relative flex flex-col md:flex-row gap-4 p-4 rounded-xl hover:bg-white/5 transition-colors border border-transparent hover:border-white/5">
                            <div class="md:w-24 shrink-0 flex items-center justify-between md:flex-col md:items-start md:justify-start">
                                <span class="inline-block px-3 py-1 bg-white/10 text-indigo-300 text-sm font-semibold rounded-lg mb-2">${line.speaker}</span>
                                <button onclick="playAudio('${line.hanzi.replace(/'/g, "\\'")}')" class="p-2 text-slate-400 hover:text-teal-400 hover:bg-teal-400/10 rounded-full transition-all">
                                    <i class="fa-solid fa-volume-up"></i>
                                </button>
                            </div>
                            <div class="flex-1 space-y-2">
                                <p class="text-2xl text-white font-medium">${line.hanzi}</p>
                                <p class="text-indigo-300 font-medium">${line.pinyin}</p>
                                <div class="space-y-1 mt-3 pt-3 border-t border-white/5 text-sm">
                                    <p class="text-slate-300"><span class="text-slate-500 font-mono w-6 inline-block">UZ</span> ${line.uz}</p>
                                    <p class="text-slate-400"><span class="text-slate-500 font-mono w-6 inline-block">RU</span> ${line.ru}</p>
                                    <p class="text-slate-500"><span class="text-slate-600 font-mono w-6 inline-block">EN</span> ${line.en}</p>
                                </div>
                            </div>
                        </div>
                    `;
                });
                html += `</div></div>`;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        // --- GRAMMAR ---
        function renderGrammar() {
            const container = document.getElementById('main-content');
            let html = '<div class="space-y-6 max-w-4xl mx-auto">';
            GRAMMAR.forEach(item => {
                html += `
                    <div class="bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-6 shadow-xl">
                        <h3 class="text-2xl font-bold text-indigo-300 mb-4">${item.title}</h3>
                        
                        <div class="mb-6 space-y-2 text-slate-300 bg-black/20 p-4 rounded-xl border border-white/5">
                            <p><span class="font-semibold text-white mr-2">🇺🇿 O'zbek:</span> ${item.explanation.uz}</p>
                            <p><span class="font-semibold text-white mr-2">🇷🇺 Рус:</span> ${item.explanation.ru}</p>
                            <p><span class="font-semibold text-white mr-2">🇬🇧 Eng:</span> ${item.explanation.en}</p>
                        </div>

                        <div class="space-y-4">
                            <h4 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">Misollar (Examples)</h4>
                `;
                item.examples.forEach(ex => {
                    html += `
                        <div class="flex flex-col gap-1 p-3 rounded-lg hover:bg-white/5 transition border border-transparent hover:border-white/5 group">
                            <div class="flex items-center justify-between">
                                <p class="text-xl text-white">${ex.hanzi}</p>
                                <button onclick="playAudio('${ex.hanzi.replace(/'/g, "\\'")}')" class="text-slate-500 hover:text-indigo-400 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <i class="fa-solid fa-volume-up"></i>
                                </button>
                            </div>
                            <p class="text-indigo-300/80">${ex.pinyin}</p>
                            <p class="text-slate-400 italic text-sm">${ex.uz}</p>
                        </div>
                    `;
                });
                html += `</div></div>`;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        // --- GRAMMAR TEST ---
        let gtState = { questions: [], currentIndex: 0, score: 0, finished: false };

        function startGrammarTest() {
            gtState.questions = shuffleArray(GRAMMAR_TEST).map(q => ({
                ...q,
                options: shuffleArray(q.options)
            }));
            gtState.currentIndex = 0;
            gtState.score = 0;
            gtState.finished = false;
            renderGrammarTestUI();
        }

        function renderGrammarTestUI() {
            const container = document.getElementById('main-content');
            if (activeTab !== 'grammarTest') return;

            if (gtState.finished) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-12 bg-white/5 backdrop-blur-sm rounded-2xl border border-white/10">
                        <i class="fa-solid fa-circle-check text-teal-400 text-7xl mb-4"></i>
                        <h2 class="text-3xl font-bold text-white mb-2">Test Yakunlandi!</h2>
                        <p class="text-xl text-slate-300 mb-8">Sizning natijangiz: ${gtState.score} / ${gtState.questions.length}</p>
                        <button onclick="startGrammarTest()" class="px-6 py-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-medium transition flex items-center gap-2">
                            <i class="fa-solid fa-rotate-right"></i> Qayta boshlash
                        </button>
                    </div>
                `;
                return;
            }

            const currentQ = gtState.questions[gtState.currentIndex];
            let optionsHtml = currentQ.options.map(opt => `
                <button onclick="handleGrammarAnswer(this, '${opt.replace(/'/g, "\\'")}', '${currentQ.ans.replace(/'/g, "\\'")}')" class="grammar-opt-btn p-4 rounded-xl border transition-all duration-300 text-xl font-semibold bg-white/10 hover:bg-white/20 border-white/20 text-white">
                    ${opt}
                </button>
            `).join('');

            container.innerHTML = `
                <div class="max-w-2xl mx-auto bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-8 shadow-2xl">
                    <div class="flex justify-between text-slate-400 text-sm font-medium mb-6">
                        <span>Savol: ${gtState.currentIndex + 1} / ${gtState.questions.length}</span>
                        <span>Natija: ${gtState.score}</span>
                    </div>
                    
                    <div class="mb-10">
                        <h1 class="text-3xl sm:text-4xl font-bold text-white leading-relaxed">${currentQ.q}</h1>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        ${optionsHtml}
                    </div>
                </div>
            `;
        }

        window.handleGrammarAnswer = function(btn, selectedOpt, correctOpt) {
            const btns = document.querySelectorAll('.grammar-opt-btn');
            btns.forEach(b => {
                b.disabled = true;
                b.classList.remove('bg-white/10', 'hover:bg-white/20', 'border-white/20', 'text-white');
                b.classList.add('bg-white/5', 'border-white/5', 'text-slate-500', 'opacity-50');
                if (b.innerText.trim() === correctOpt) {
                    b.className = "grammar-opt-btn p-4 rounded-xl border transition-all duration-300 text-xl font-semibold bg-teal-500/50 border-teal-500 text-white";
                }
            });

            if (selectedOpt === correctOpt) {
                gtState.score++;
            } else {
                btn.className = "grammar-opt-btn p-4 rounded-xl border transition-all duration-300 text-xl font-semibold bg-rose-500/50 border-rose-500 text-white";
            }

            setTimeout(() => {
                if (gtState.currentIndex < gtState.questions.length - 1) {
                    gtState.currentIndex++;
                    renderGrammarTestUI();
                } else {
                    gtState.finished = true;
                    renderGrammarTestUI();
                }
            }, 1200);
        };

        // --- FILL IN THE BLANKS ---
        let fbAnswers = {};

        function renderFillBlanks() {
            fbAnswers = {};
            const words = [...VOCABULARY].map(v => v.hanzi).sort((a, b) => a.localeCompare(b, 'zh-Hans-CN'));
            const container = document.getElementById('main-content');
            
            let html = `
                <div class="max-w-4xl mx-auto bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-6 md:p-8 shadow-2xl">
                    <div class="flex justify-between items-center mb-8">
                        <h2 class="text-2xl font-bold text-white">So'zlarni to'ldiring</h2>
                        <span id="fb-score" class="hidden px-4 py-1 bg-indigo-500/30 text-indigo-200 rounded-full font-medium border border-indigo-500/50"></span>
                    </div>
                    <div class="space-y-6">
            `;

            FILL_BLANKS.forEach((item, index) => {
                let options = `<option value="" disabled selected class="bg-slate-800 text-slate-400">___</option>`;
                words.forEach(w => {
                    options += `<option value="${w}" class="bg-slate-800 text-white">${w}</option>`;
                });
                
                html += `
                    <div class="flex flex-wrap items-center gap-2 text-lg sm:text-xl text-white bg-black/20 p-4 rounded-xl border border-white/5">
                        <span class="text-indigo-400 font-mono text-sm mr-2">${index + 1}.</span>
                        <span>${item.parts[0]}</span>
                        
                        <div class="relative inline-block">
                            <select onchange="fbAnswers[${item.id}] = this.value" id="fb-select-${item.id}" class="appearance-none outline-none font-semibold px-4 py-1 rounded-lg cursor-pointer transition-colors bg-white/10 hover:bg-white/20 border border-white/20 text-indigo-300">
                                ${options}
                            </select>
                        </div>

                        <span>${item.parts[1]}</span>
                        <span id="fb-result-${item.id}" class="ml-2 flex items-center hidden"></span>
                    </div>
                `;
            });

            html += `
                    </div>
                    <div class="mt-8 flex gap-4 justify-end" id="fb-actions">
                        <button onclick="checkFbAnswers()" class="px-6 py-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-medium transition flex items-center gap-2 shadow-lg shadow-indigo-900/50">
                            <i class="fa-solid fa-check-square"></i> Tekshirish
                        </button>
                    </div>
                </div>
            `;
            container.innerHTML = html;
        }

        window.checkFbAnswers = function() {
            let score = 0;
            FILL_BLANKS.forEach(item => {
                const select = document.getElementById(`fb-select-${item.id}`);
                const resultSpan = document.getElementById(`fb-result-${item.id}`);
                select.disabled = true;
                
                if (fbAnswers[item.id] === item.ans) {
                    score++;
                    select.className = "appearance-none outline-none font-semibold px-4 py-1 rounded-lg cursor-not-allowed transition-colors bg-teal-500/20 border border-teal-500 text-teal-300";
                    resultSpan.innerHTML = `<i class="fa-solid fa-circle-check text-teal-400"></i>`;
                    resultSpan.classList.remove('hidden');
                } else {
                    select.className = "appearance-none outline-none font-semibold px-4 py-1 rounded-lg cursor-not-allowed transition-colors bg-rose-500/20 border border-rose-500 text-rose-300";
                    resultSpan.innerHTML = `<i class="fa-solid fa-circle-xmark text-rose-400 mr-1"></i><span class="text-sm text-rose-400">(To'g'ri: <span class="font-bold">${item.ans}</span>)</span>`;
                    resultSpan.classList.remove('hidden');
                }
            });

            const scoreSpan = document.getElementById('fb-score');
            scoreSpan.textContent = `Natija: ${score} / ${FILL_BLANKS.length}`;
            scoreSpan.classList.remove('hidden');

            document.getElementById('fb-actions').innerHTML = `
                <button onclick="renderFillBlanks()" class="px-6 py-3 bg-slate-700 hover:bg-slate-600 text-white rounded-xl font-medium transition flex items-center gap-2">
                    <i class="fa-solid fa-rotate-right"></i> Qayta ishlash
                </button>
            `;
        };

        // Bootstrap App
        window.onload = init;
    </script>
</body>
</html>
